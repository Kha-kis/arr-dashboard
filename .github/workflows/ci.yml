name: CI

on:
  push:
    branches: [main, "release/**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main, "release/**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - "LICENSE"
      - ".gitignore"

# Cancel in-progress runs when a new push arrives (saves runner minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  DOCKERHUB_IMAGE: khak1s/arr-dashboard

jobs:
  # Lint, Type Check, and Unit Tests (merged — both fast, same setup)
  lint-and-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Cache Turbo build
        uses: actions/cache@v5
        with:
          path: node_modules/.cache/turbo
          key: turbo-lint-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            turbo-lint-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies for vulnerabilities
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Generate Prisma Client
        run: cd apps/api && pnpm exec prisma generate

      - name: Build shared package
        run: pnpm --filter @arr/shared run build

      - name: Run linting
        run: pnpm run lint

      - name: Run type checking
        run: pnpm run typecheck

      - name: Check for dead code (Knip)
        run: pnpm exec knip --no-exit-code

      - name: Run tests
        run: pnpm run test

  # End-to-End Tests with Playwright (sharded for parallelism)
  # Uses production builds for faster, more realistic testing
  e2e:
    name: E2E Tests (${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Cache Turbo build
        uses: actions/cache@v5
        with:
          path: node_modules/.cache/turbo
          key: turbo-e2e-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            turbo-e2e-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/api && pnpm exec prisma generate

      - name: Build all packages (production)
        run: pnpm run build

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Setup database
        run: cd apps/api && pnpm exec prisma db push
        env:
          DATABASE_URL: file:./test.db

      - name: Run E2E tests
        run: |
          # Start API production server in background
          (cd apps/api && DATABASE_URL=file:./test.db API_RATE_LIMIT_MAX=10000 LOG_LEVEL=warn node dist/index.js) &
          API_PID=$!

          # Start Web production server in background
          (cd apps/web && pnpm exec next start -p 3000) &
          WEB_PID=$!

          # Wait for servers (production builds start much faster than dev)
          echo "Waiting for servers to start..."
          for i in {1..30}; do
            API_OK=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health 2>/dev/null || echo "000")
            WEB_OK=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || echo "000")
            if [ "$API_OK" = "200" ] && [ "$WEB_OK" != "000" ]; then
              echo "Both servers ready! (API: $API_OK, Web: $WEB_OK) in ${i}s"
              break
            fi
            [ $((i % 5)) -eq 0 ] && echo "Waiting... ($i/30) API=$API_OK WEB=$WEB_OK"
            sleep 1
          done

          if [ "$API_OK" != "200" ] || [ "$WEB_OK" = "000" ]; then
            echo "::error::Servers failed to start within 30s (API=$API_OK Web=$WEB_OK)"
            kill $API_PID $WEB_PID 2>/dev/null || true
            exit 1
          fi

          # Run the E2E tests (sharded)
          pnpm exec playwright test --project=chromium --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          EXIT_CODE=$?

          # Cleanup
          kill $API_PID $WEB_PID 2>/dev/null || true
          exit $EXIT_CODE
        env:
          NODE_ENV: production
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Test Screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-screenshots-${{ matrix.shardIndex }}
          path: test-results/
          retention-days: 7

  # Docker Build Test (validates Dockerfile and warms registry cache)
  # Runs in parallel with E2E — doesn't depend on E2E results
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only login for internal PRs/pushes (fork PRs and Dependabot don't have access to secrets)
      - name: Log in to Docker Hub (for cache)
        if: (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && github.actor != 'dependabot[bot]'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build with cache - fork PRs can read public cache but won't write to it
      - name: Build Docker image (amd64 only, warms cache for docker-dev)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: arr-dashboard:ci-test
          cache-from: type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:buildcache-linux-amd64
          cache-to: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && github.actor != 'dependabot[bot]' && format('type=registry,ref={0}:buildcache-linux-amd64,mode=max', env.DOCKERHUB_IMAGE) || '' }}

      - name: Validate runtime file layout
        run: docker run --rm --entrypoint sh arr-dashboard:ci-test /app/api/validate-runtime.sh
