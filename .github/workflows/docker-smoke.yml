name: Docker Smoke Test

on:
  pull_request:
    branches: [main, "feat/v2.9"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main, "feat/v2.9"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - "LICENSE"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: khak1s/arr-dashboard
  SMOKE_TIMEOUT: 90
  SMOKE_INTERVAL: 3

jobs:
  # ── Build the image once, export as tarball for downstream jobs ──
  build:
    name: Build Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub (for cache)
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: arr-dashboard:smoke
          build-args: |
            VERSION=smoke-test
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:buildcache-linux-amd64

      - name: Save image as tarball
        run: docker save arr-dashboard:smoke -o /tmp/smoke-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: smoke-image
          path: /tmp/smoke-image.tar
          retention-days: 1

  # ── SQLite smoke test ──
  smoke-sqlite:
    name: Smoke Test (SQLite)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: smoke-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/smoke-image.tar

      - name: Start container (SQLite)
        run: |
          docker run -d \
            --name smoke-sqlite \
            -p 3000:3000 \
            -p 3001:3001 \
            -v smoke-config:/config \
            -e PUID=1000 \
            -e PGID=1000 \
            arr-dashboard:smoke

      - name: Wait for API health (port 3001)
        run: |
          echo "Polling API /health on port 3001 (timeout: ${SMOKE_TIMEOUT}s)..."
          elapsed=0
          while [ "$elapsed" -lt "$SMOKE_TIMEOUT" ]; do
            response=$(curl -sf http://localhost:3001/health 2>/dev/null || echo "")
            if [ -n "$response" ]; then
              status=$(echo "$response" | jq -r '.status // empty')
              version=$(echo "$response" | jq -r '.version // empty')
              commit=$(echo "$response" | jq -r '.commit // empty')

              if [ "$status" = "ok" ] && [ -n "$version" ] && [ -n "$commit" ] && [ "$commit" != "unknown" ]; then
                echo ""
                echo "=== API health check PASSED (${elapsed}s) ==="
                echo "$response" | jq .
                break
              fi
              echo "  [${elapsed}s] status=$status version=$version commit=$commit"
            else
              echo "  [${elapsed}s] API not ready..."
            fi
            sleep "$SMOKE_INTERVAL"
            elapsed=$((elapsed + SMOKE_INTERVAL))
          done

          if [ "$elapsed" -ge "$SMOKE_TIMEOUT" ]; then
            echo ""
            echo "=== API health check FAILED after ${SMOKE_TIMEOUT}s ==="
            echo "Last response: $response"
            exit 1
          fi

      - name: Verify web server (port 3000)
        run: |
          echo "Checking web server responds on port 3000..."
          # The web /health proxies to API and returns { status: "ok" }
          for i in $(seq 1 10); do
            web_response=$(curl -sf http://localhost:3000/health 2>/dev/null || echo "")
            web_status=$(echo "$web_response" | jq -r '.status // empty' 2>/dev/null || echo "")
            if [ "$web_status" = "ok" ]; then
              echo "=== Web health check PASSED ==="
              echo "$web_response" | jq .
              exit 0
            fi
            echo "  Attempt $i/10: web not ready..."
            sleep 2
          done
          echo "=== Web health check FAILED ==="
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: docker logs smoke-sqlite 2>&1

      - name: Cleanup
        if: always()
        run: |
          docker rm -f smoke-sqlite 2>/dev/null || true
          docker volume rm smoke-config 2>/dev/null || true

  # ── PostgreSQL smoke test ──
  smoke-postgres:
    name: Smoke Test (PostgreSQL)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arr
          POSTGRES_PASSWORD: arr_smoke_test
          POSTGRES_DB: arr_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U arr"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: smoke-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/smoke-image.tar

      - name: Start container (PostgreSQL)
        run: |
          # Connect app to the same Docker network as the postgres service container
          # so it can reach postgres via hostname. Use port mapping for external access.
          PG_NETWORK=$(docker inspect ${{ job.services.postgres.id }} --format '{{json .NetworkSettings.Networks}}' | jq -r 'keys[0]')
          echo "PostgreSQL service network: $PG_NETWORK"

          docker run -d \
            --name smoke-postgres \
            --network "$PG_NETWORK" \
            -p 3000:3000 \
            -p 3001:3001 \
            -e DATABASE_URL="postgresql://arr:arr_smoke_test@postgres:5432/arr_dashboard" \
            -e PUID=1000 \
            -e PGID=1000 \
            -e PORT=3000 \
            -e API_PORT=3001 \
            arr-dashboard:smoke

      - name: Wait for API health (port 3001)
        run: |
          echo "Polling API /health on port 3001 (timeout: ${SMOKE_TIMEOUT}s)..."
          elapsed=0
          while [ "$elapsed" -lt "$SMOKE_TIMEOUT" ]; do
            response=$(curl -sf http://localhost:3001/health 2>/dev/null || echo "")
            if [ -n "$response" ]; then
              status=$(echo "$response" | jq -r '.status // empty')
              version=$(echo "$response" | jq -r '.version // empty')
              commit=$(echo "$response" | jq -r '.commit // empty')

              if [ "$status" = "ok" ] && [ -n "$version" ] && [ -n "$commit" ] && [ "$commit" != "unknown" ]; then
                echo ""
                echo "=== API health check PASSED (${elapsed}s) ==="
                echo "$response" | jq .
                break
              fi
              echo "  [${elapsed}s] status=$status version=$version commit=$commit"
            else
              echo "  [${elapsed}s] API not ready..."
            fi
            sleep "$SMOKE_INTERVAL"
            elapsed=$((elapsed + SMOKE_INTERVAL))
          done

          if [ "$elapsed" -ge "$SMOKE_TIMEOUT" ]; then
            echo ""
            echo "=== API health check FAILED after ${SMOKE_TIMEOUT}s ==="
            echo "Last response: $response"
            exit 1
          fi

      - name: Verify web server (port 3000)
        run: |
          echo "Checking web server responds on port 3000..."
          for i in $(seq 1 10); do
            web_response=$(curl -sf http://localhost:3000/health 2>/dev/null || echo "")
            web_status=$(echo "$web_response" | jq -r '.status // empty' 2>/dev/null || echo "")
            if [ "$web_status" = "ok" ]; then
              echo "=== Web health check PASSED ==="
              echo "$web_response" | jq .
              exit 0
            fi
            echo "  Attempt $i/10: web not ready..."
            sleep 2
          done
          echo "=== Web health check FAILED ==="
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: docker logs smoke-postgres 2>&1

      - name: Dump postgres logs on failure
        if: failure()
        run: docker logs "${{ job.services.postgres.id }}" 2>&1 || true

      - name: Cleanup
        if: always()
        run: docker rm -f smoke-postgres 2>/dev/null || true
